<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akshay Patra - Admin Profile</title>
    <!-- Font Awesome Icons CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            display: flex;
            background-color: #f4f7f5;
            min-height: 100vh;
        }

        /* --- SIDEBAR NAVIGATION --- */
        .sidebar {
            width: 260px;
            background-color: #064e35;
            color: white;
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
            left: 0;
            top: 0;
        }

        .sidebar-brand {
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            background-color: #ffffff;
        }

        .sidebar-logo {
            width: 100%;
            max-width: 180px;
            height: auto;
            display: block;
            margin: 0 auto;
        }

        .sidebar-menu {
            list-style: none;
            padding: 20px 0;
            flex: 1;
        }

        .sidebar-menu li a {
            display: flex;
            align-items: center;
            padding: 15px 25px;
            color: #e0f0e8;
            text-decoration: none;
            font-size: 14px;
            transition: 0.3s;
        }

        .sidebar-menu li a i {
            margin-right: 15px;
            font-size: 18px;
            width: 25px;
            text-align: center;
        }

        .sidebar-menu li.active a,
        .sidebar-menu li a:hover {
            background-color: rgba(255, 255, 255, 0.1);
            color: #ffffff;
            border-left: 4px solid #8dc63f;
        }

        .sidebar-footer {
            padding: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-logout {
            width: 100%;
            background-color: #d9534f;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            text-decoration: none;
            font-size: 14px;
        }

        /* --- MAIN CONTENT --- */
        .main-content {
            margin-left: 260px;
            flex: 1;
            padding: 40px;
        }

        .header {
            margin-bottom: 30px;
        }

        .header h1 {
            color: #064e35;
            font-size: 28px;
            font-weight: 700;
        }

        /* --- PROFILE LAYOUT --- */
        .profile-container {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 30px;
        }

        .profile-card,
        .account-settings-card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.02);
        }

        /* LEFT SIDE: AVATAR CARD */
        .profile-card {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .profile-avatar {
            width: 110px;
            height: 110px;
            background-color: #eaf4f0;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 45px;
            color: #064e35;
            margin-bottom: 15px;
            border: 3px solid #8dc63f;
        }

        .profile-card h2 {
            font-size: 20px;
            color: #333;
            font-weight: 600;
        }

        .profile-card p {
            font-size: 13px;
            color: #777;
            margin-bottom: 15px;
        }

        .badge-role {
            background-color: #064e35;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        /* RIGHT SIDE: FORMS */
        .account-settings-card h3 {
            color: #064e35;
            font-size: 18px;
            margin-bottom: 20px;
            border-bottom: 1px solid #eee;
            padding-bottom: 8px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .form-group label {
            font-size: 12px;
            font-weight: 600;
            color: #555;
        }

        .form-group input {
            padding: 10px 15px;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            font-size: 13px;
            outline: none;
            color: #333;
            background-color: #fcfcfc;
        }

        .form-group input:focus {
            border-color: #064e35;
            background-color: #fff;
        }

        .form-group input[readonly] {
            background-color: #f4f4f4;
            color: #888;
            cursor: not-allowed;
        }

        .btn-save {
            background-color: #064e35;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-save:hover {
            background-color: #0c694a;
        }

        @media (max-width: 992px) {
            .sidebar {
                width: 70px;
            }

            .sidebar-brand,
            .sidebar-menu span,
            .btn-logout span,
            .sidebar-footer {
                display: none;
            }

            .main-content {
                margin-left: 70px;
            }

            .profile-container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

    <!-- SIDEBAR -->
    <div class="sidebar">
        <div class="sidebar-brand">
            <img src="image.png" alt="Akshaya Patra Logo" class="sidebar-logo">
        </div>
        <ul class="sidebar-menu">
            <li><a href="dashboard.html"><i class="fa-solid fa-chart-pie"></i> <span>Dashboard</span></a></li>
            <li><a href="complaints.html"><i class="fa-regular fa-clipboard"></i> <span>Complaints</span></a></li>
            <li class="active"><a href="profile.html"><i class="fa-regular fa-user"></i> <span>Profile</span></a></li>
        </ul>
        <div class="sidebar-footer">
            <a href="index.html" class="btn-logout">
                <i class="fa-solid fa-right-from-bracket"></i> <span>Logout</span>
            </a>
        </div>
    </div>

    <!-- MAIN CONTENT -->
    <div class="main-content">
        <div class="header">
            <h1>My Profile</h1>
        </div>

        <div class="profile-container">
            <!-- LEFT PANEL: AVATAR CARD -->
            <div class="profile-card">
                <div class="profile-avatar">
                    <i class="fa-regular fa-user"></i>
                </div>
                <h2>Admin Portal</h2>
                <p>Akshaya Patra Foundation</p>
                <span class="badge-role">Super Admin</span>
            </div>

            <!-- RIGHT PANEL: DETAILS & PASSWORD -->
            <div class="account-settings-card">
                <!-- SECTION 1: PERSONAL INFO -->
                <h3>Personal Information</h3>
                <form id="profileForm" style="margin-bottom: 35px;">
                    <div class="form-grid">
                        <div class="form-group">
                            <label>Full Name</label>
                            <input type="text" value="Admin Portal Executive" placeholder="Enter full name">
                        </div>
                        <div class="form-group">
                            <label>Email Address</label>
                            <input type="email" value="admin@akshayapatra.org" placeholder="Enter email">
                        </div>
                        <div class="form-group">
                            <label>Contact Number</label>
                            <input type="text" value="+91 98765 43210" placeholder="Enter phone number">
                        </div>
                        <div class="form-group">
                            <label>Assigned Department</label>
                            <input type="text" value="All / Central Control" readonly>
                        </div>
                    </div>
                    <button type="submit" class="btn-save"><i class="fa-regular fa-circle-check"></i> Save
                        Changes</button>
                </form>

                <!-- SECTION 2: CHANGE PASSWORD -->
                <h3>Security & Password</h3>
                <form id="passwordForm">
                    <div class="form-grid">
                        <div class="form-group">
                            <label>Current Password</label>
                            <input type="password" placeholder="••••••••" required>
                        </div>
                        <div class="form-group">
                            <label>New Password</label>
                            <input type="password" placeholder="Enter new password" required>
                        </div>
                    </div>
                    <button type="submit" class="btn-save" style="background-color: #333;"><i
                            class="fa-solid fa-key"></i> Update Password</button>
                </form>
            </div>
        </div>
    </div>

    <!-- Demo Logic alerts -->
    <script>
        document.getElementById('profileForm').addEventListener('submit', function (e) {
            e.preventDefault();
            alert('Profile information updated successfully! (Demo)');
        });

        document.getElementById('passwordForm').addEventListener('submit', function (e) {
            e.preventDefault();
            alert('Password changed successfully! (Demo)');
        });
    </script>

</body>

</html>
