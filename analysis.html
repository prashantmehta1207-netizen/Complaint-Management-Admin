<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complaints Analysis Dashboard</title>

    <!-- Chart.js & FontAwesome Icons -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <!-- html2pdf Library for PDF Export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background-color: #f4f6f9;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            background: #fff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        .header h1 {
            color: #333;
            font-size: 24px;
        }

        .btn-group {
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.3s;
        }

        .btn-pdf {
            background-color: #dc3545;
            color: white;
        }

        .btn-excel {
            background-color: #198754;
            color: white;
        }

        .btn:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        .filter-section {
            background: #fff;
            padding: 15px 20px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .filter-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .filter-group label {
            font-weight: 600;
            color: #555;
        }

        .filter-control {
            padding: 8px 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
            outline: none;
            font-size: 14px;
            background-color: #fff;
            cursor: pointer;
        }

        .charts-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        @media (max-width: 768px) {
            .charts-grid {
                grid-template-columns: 1fr;
            }

            .filter-section {
                flex-direction: column;
                align-items: flex-start;
                gap: 15px;
            }
        }

        .chart-card {
            background: #fff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        .chart-card h3,
        .table-card h3 {
            color: #444;
            margin-bottom: 20px;
            font-size: 18px;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 10px;
        }

        .chart-container {
            position: relative;
            height: 350px;
            width: 100%;
        }

        /* 🛠️ PDF અને વેબ બંનેમાં પ્રોપર ફિટિંગ માટે ટેબલ કાર્ડના CSS */
        .table-card {
            background: #fff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
            margin-top: 20px;
            width: 100%;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            table-layout: fixed;
            /* 👈 આનાથી બધી કોલમ આપણી આપેલી સાઈઝમાં જ ફિટ થશે */
        }

        th,
        td {
            padding: 12px 10px;
            border-bottom: 1px solid #e0e0e0;
            color: #555;
            word-wrap: break-word;
            /* લાંબી ટેક્સ્ટ હોય તો ઓટોમેટિક નીચે આવી જશે */
            font-size: 14px;
        }

        th {
            background-color: #0b6643;
            color: white;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        /* 🛠️ દરેક કોલમની વિડ્થ (Width) ફિક્સ કરી દીધી જેથી છેલ્લી કોલમ કપાય નહીં */
        .col-id {
            width: 15%;
        }

        .col-dept {
            width: 20%;
        }

        .col-title {
            width: 33%;
        }

        .col-status {
            width: 14%;
        }

        .col-date {
            width: 18%;
        }

        tr:hover {
            background-color: #f8f9fa;
        }

        .badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
            display: inline-block;
        }

        .badge-pending {
            background-color: #ffc107;
            color: #000;
        }

        .badge-resolved {
            background-color: #198754;
            color: #fff;
        }
    </style>
</head>

<body>

    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1><i class="fa-solid fa-chart-line" style="color: #0b6643;"></i> Complaints Analytics</h1>
            <div class="btn-group">
                <button class="btn btn-pdf" id="downloadPDF"><i class="fa-solid fa-file-pdf"></i> Export PDF</button>
                <button class="btn btn-excel" id="downloadExcel"><i class="fa-solid fa-file-excel"></i> Export
                    CSV</button>
            </div>
        </div>

        <!-- Filter Options Section -->
        <div class="filter-section">
            <div class="filter-group">
                <label for="yearSelect"><i class="fa-solid fa-calendar"></i> Year:</label>
                <select id="yearSelect" class="filter-control">
                    <option value="all">All Years</option>
                </select>
            </div>
            <div class="filter-group">
                <label for="monthSelect"><i class="fa-solid fa-calendar-minus"></i> Month:</label>
                <select id="monthSelect" class="filter-control">
                    <option value="all">All Months</option>
                    <option value="0">January</option>
                    <option value="1">February</option>
                    <option value="2">March</option>
                    <option value="3">April</option>
                    <option value="4">May</option>
                    <option value="5">June</option>
                    <option value="6">July</option>
                    <option value="7">August</option>
                    <option value="8">September</option>
                    <option value="9">October</option>
                    <option value="10">November</option>
                    <option value="11">December</option>
                </select>
            </div>
        </div>

        <!-- Charts Grid Area -->
        <div class="charts-grid">
            <!-- Monthly Trend Chart -->
            <div class="chart-card">
                <h3><i class="fa-solid fa-calendar-days"></i> Monthly Complaints Trend</h3>
                <div class="chart-container">
                    <canvas id="monthlyBarChart"></canvas>
                </div>
            </div>

            <!-- 5 Departments Share Chart -->
            <div class="chart-card">
                <h3><i class="fa-solid fa-building"></i> Department Share</h3>
                <div class="chart-container">
                    <canvas id="deptDoughnutChart"></canvas>
                </div>
            </div>
        </div>

        <!-- Detailed Complaints Record Table -->
        <div class="table-card" id="onlyTableArea">
            <h3><i class="fa-solid fa-list"></i> Detailed Complaints Record</h3>
            <table>
                <thead>
                    <tr>
                        <th class="col-id">Complaint ID</th>
                        <th class="col-dept">Department</th>
                        <th class="col-title">Title</th>
                        <th class="col-status">Status</th>
                        <th class="col-date">Date Created</th>
                    </tr>
                </thead>
                <tbody id="complaintsTableBody">
                    <tr>
                        <td colspan="5" style="text-align: center;">Loading data records...</td>
                    </tr>
                </tbody>
            </table>
        </div>

    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCrne4zTG5Z5wrpps3N6WTX__WJREJ_r1I",
            authDomain: "akshayapatraassetmanagement.firebaseapp.com",
            projectId: "akshayapatraassetmanagement",
            storageBucket: "akshayapatraassetmanagement.firebasestorage.app",
            messagingSenderId: "746715439733",
            appId: "1:746715439733:web:e1567c9a04da24398b0e3c"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.firestore();

        let monthlyChart = null;
        let deptChart = null;
        let allComplaints = [];
        let filteredComplaintsGlobal = [];

        const yearSelect = document.getElementById('yearSelect');
        const monthSelect = document.getElementById('monthSelect');

        function populateYearDropdown(complaints) {
            const years = new Set();
            complaints.forEach(item => {
                if (item.createdAt) {
                    const date = item.createdAt.toDate ? item.createdAt.toDate() : new Date(item.createdAt);
                    years.add(date.getFullYear());
                }
            });

            yearSelect.innerHTML = '<option value="all">All Years</option>';
            Array.from(years).sort().forEach(year => {
                const option = document.createElement('option');
                option.value = year;
                option.textContent = year;
                yearSelect.appendChild(option);
            });
        }

        function applyFilters() {
            const selectedYear = yearSelect.value;
            const selectedMonth = monthSelect.value;

            filteredComplaintsGlobal = allComplaints.filter(item => {
                if (!item.createdAt) return false;
                const date = item.createdAt.toDate ? item.createdAt.toDate() : new Date(item.createdAt);

                const matchesYear = (selectedYear === 'all' || date.getFullYear().toString() === selectedYear);
                const matchesMonth = (selectedMonth === 'all' || date.getMonth().toString() === selectedMonth);

                return matchesYear && matchesMonth;
            });

            processAnalytics(filteredComplaintsGlobal);
        }

        yearSelect.addEventListener('change', applyFilters);
        monthSelect.addEventListener('change', applyFilters);

        function processAnalytics(complaints) {
            const monthlyCounts = { Jan: 0, Feb: 0, Mar: 0, Apr: 0, May: 0, Jun: 0, Jul: 0, Aug: 0, Sep: 0, Oct: 0, Nov: 0, Dec: 0 };
            const monthNames = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];

            const deptCounts = {
                "Mechanical": 0,
                "IT": 0,
                "Electrical": 0,
                "Maintenance": 0,
                "Kitchen/Production": 0
            };

            const tableBody = document.getElementById('complaintsTableBody');
            let tableHTML = "";

            complaints.sort((a, b) => {
                const idA = a.id || a.complaintId || "";
                const idB = b.id || b.complaintId || "";
                return idA.localeCompare(idB, undefined, { numeric: true, sensitivity: 'base' });
            });

            complaints.forEach((item) => {
                if (item.createdAt) {
                    const date = item.createdAt.toDate ? item.createdAt.toDate() : new Date(item.createdAt);
                    const monthName = monthNames[date.getMonth()];
                    if (monthlyCounts[monthName] !== undefined) {
                        monthlyCounts[monthName]++;
                    }
                }

                let rawCategory = item.category ? item.category.toLowerCase() : "general";
                let mappedDept = "General";

                if (rawCategory.includes("mech")) mappedDept = "Mechanical";
                else if (rawCategory === "it" || rawCategory.includes("information")) mappedDept = "IT";
                else if (rawCategory.includes("ele")) mappedDept = "Electrical";
                else if (rawCategory.includes("main")) mappedDept = "Maintenance";
                else if (rawCategory.includes("ki") || rawCategory.includes("pro")) mappedDept = "Kitchen/Production";
                else mappedDept = item.category || "General";

                if (deptCounts[mappedDept] !== undefined) {
                    deptCounts[mappedDept]++;
                } else {
                    deptCounts[mappedDept] = 1;
                }

                const statusClass = item.status?.toLowerCase() === 'resolved' ? 'badge-resolved' : 'badge-pending';
                const finalComplaintID = item.id || item.complaintId || "N/A";
                const finalTitle = item.title || "No Title Specified";

                let displayDate = "N/A";
                if (item.createdAt) {
                    const d = item.createdAt.toDate ? item.createdAt.toDate() : new Date(item.createdAt);
                    displayDate = d.toLocaleDateString('en-US', { day: 'numeric', month: 'short', year: 'numeric' });
                }

                tableHTML += `
                <tr>
                    <td><strong>${finalComplaintID}</strong></td>
                    <td>${mappedDept}</td>
                    <td>${finalTitle}</td>
                    <td><span class="badge ${statusClass}">${item.status || 'Pending'}</span></td>
                    <td>${displayDate}</td>
                </tr>
            `;
            });

            tableBody.innerHTML = tableHTML || `<tr><td colspan="5" style="text-align: center;">No complaints found for the selected filter.</td></tr>`;

            updateMonthlyChart(monthlyCounts);
            updateDeptChart(deptCounts);
        }

        function updateMonthlyChart(data) {
            const ctx = document.getElementById('monthlyBarChart').getContext('2d');
            if (monthlyChart) {
                monthlyChart.data.datasets[0].data = Object.values(data);
                monthlyChart.update();
            } else {
                monthlyChart = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: Object.keys(data),
                        datasets: [{
                            label: 'Total Complaints',
                            data: Object.values(data),
                            backgroundColor: '#a2cfb6',
                            borderColor: '#7cb696',
                            borderWidth: 1,
                            hoverBackgroundColor: '#5ea37e',
                            borderRadius: 5
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } }
                    }
                });
            }
        }

        function updateDeptChart(data) {
            const ctx = document.getElementById('deptDoughnutChart').getContext('2d');
            const chartColors = ['#dc3545', '#0d6efd', '#ffc107', '#0b6643', '#fd7e14', '#6c757d'];

            if (deptChart) {
                deptChart.data.labels = Object.keys(data);
                deptChart.data.datasets[0].data = Object.values(data);
                deptChart.update();
            } else {
                deptChart = new Chart(ctx, {
                    type: 'doughnut',
                    data: {
                        labels: Object.keys(data),
                        datasets: [{
                            data: Object.values(data),
                            backgroundColor: chartColors
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: { position: 'right' }
                        }
                    }
                });
            }
        }

        // Real-time Firebase Link
        db.collection("complaints").onSnapshot((snapshot) => {
            let complaints = [];
            snapshot.forEach(doc => {
                const data = doc.data();
                complaints.push({
                    firestoreDocId: doc.id,
                    ...data
                });
            });

            allComplaints = complaints;
            populateYearDropdown(allComplaints);
            applyFilters();
        }, (error) => {
            console.error("Firebase Sync Failure:", error);
        });

        // PDF Export - પરફેક્ટ વિડ્થ સેટિંગ સાથે
        document.getElementById('downloadPDF').addEventListener('click', () => {
            const element = document.getElementById('onlyTableArea');
            const opt = {
                margin: [15, 12, 15, 12], // પ્રોપર લેફ્ટ-રાઇટ માર્જિન સેટ કર્યું
                filename: 'Complaints_Table_Report.pdf',
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: {
                    scale: 2,
                    scrollY: 0,
                    scrollX: 0,
                    letterRendering: true,
                    useCORS: true
                },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };
            html2pdf().set(opt).from(element).save();
        });

        // CSV Export
        document.getElementById('downloadExcel').addEventListener('click', () => {
            if (filteredComplaintsGlobal.length === 0) return alert("No data available to export!");

            let csvContent = "data:text/csv;charset=utf-8,ID,Category/Dept,Title,Status,Date Created\n";

            filteredComplaintsGlobal.forEach((item) => {
                let dateStr = "N/A";
                if (item.createdAt) {
                    const d = item.createdAt.toDate ? item.createdAt.toDate() : new Date(item.createdAt);
                    dateStr = `${d.getDate()}-${d.getMonth() + 1}-${d.getFullYear()}`;
                }

                let rawCategory = item.category ? item.category.toLowerCase() : "general";
                let mappedDept = "General";
                if (rawCategory.includes("mech")) mappedDept = "Mechanical";
                else if (rawCategory === "it" || rawCategory.includes("information")) mappedDept = "IT";
                else if (rawCategory.includes("ele")) mappedDept = "Electrical";
                else if (rawCategory.includes("main")) mappedDept = "Maintenance";
                else if (rawCategory.includes("ki") || rawCategory.includes("pro")) mappedDept = "Kitchen/Production";
                else mappedDept = item.category || "General";

                const finalComplaintID = item.id || item.complaintId || "N/A";
                const finalTitle = item.title || "No Title Specified";
                const finalStatus = item.status || "Pending";

                const row = `"${finalComplaintID}","${mappedDept}","${finalTitle}","${finalStatus}","${dateStr}"`;
                csvContent += row + "\n";
            });

            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", "Filtered_Complaints_Data.csv");
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        });
    </script>
</body>

</html>
